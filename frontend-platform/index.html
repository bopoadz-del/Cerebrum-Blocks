<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebrum OS - Universal Block Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; height: 100vh; background: #0d0d0d; overflow: hidden; color: #e0e0e0; }
        
        /* Dark theme overrides */
        .socket-left { width: 280px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .logo { padding: 20px; font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: #fff; }
        .logo::before { content: "◆"; color: #8b5cf6; }
        .new-chat-btn { margin: 0 20px 20px; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .new-chat-btn:hover { background: #252525; }
        .section-title { padding: 12px 20px; font-size: 11px; text-transform: uppercase; color: #666; font-weight: 600; letter-spacing: 0.5px; }
        .project-list { flex: 1; overflow-y: auto; }
        .project-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #999; }
        .project-item:hover { background: #1a1a1a; color: #ccc; }
        .project-item.active { background: #1a1a1a; border-right: 3px solid #8b5cf6; color: #fff; }
        
        /* CENTER: Display + Input Sockets */
        .socket-center { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; }
        
        /* Display Socket */
        .display-socket { flex: 1; overflow-y: auto; padding: 40px; }
        .welcome-screen { text-align: center; padding: 100px 20px; color: #888; }
        .welcome-screen h1 { font-size: 32px; font-weight: 400; margin-bottom: 16px; color: #fff; }
        .suggestions { display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 40px auto; }
        .suggestion { padding: 16px 20px; background: #1a1a1a; border-radius: 8px; cursor: pointer; text-align: left; border: 1px solid #2a2a2a; color: #999; }
        .suggestion:hover { background: #252525; border-color: #8b5cf6; color: #fff; }
        
        .message { margin-bottom: 24px; line-height: 1.6; }
        .message.user { font-weight: 500; color: #fff; margin-bottom: 8px; }
        .message.assistant { color: #d0d0d0; background: #1a1a1a; padding: 16px; border-radius: 8px; border: 1px solid #2a2a2a; }
        .message.error { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 16px; border-radius: 8px; }
        
        /* Data table */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 16px; color: #e0e0e0; }
        .data-table th { text-align: left; padding: 12px; background: #1a1a1a; font-size: 12px; text-transform: uppercase; color: #888; font-weight: 600; border-bottom: 1px solid #333; }
        .data-table td { padding: 12px; border-bottom: 1px solid #2a2a2a; }
        .metric-value { font-size: 24px; font-weight: 600; color: #fff; }
        .metric-value.cost { color: #8b5cf6; }
        .metric-label { font-size: 12px; color: #666; text-transform: uppercase; }
        
        /* Code output */
        .code-block { background: #0a0a0a; color: #fff; padding: 16px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; overflow-x: auto; border: 1px solid #2a2a2a; }
        
        /* Input Socket */
        .input-socket { padding: 20px 40px; border-top: 1px solid #1a1a1a; background: #0d0d0d; }
        .input-box { border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px 16px; display: flex; align-items: flex-end; gap: 12px; background: #1a1a1a; }
        .input-box:focus-within { border-color: #8b5cf6; }
        .input-text { flex: 1; border: none; background: transparent; resize: none; outline: none; font-size: 15px; line-height: 1.5; max-height: 200px; min-height: 24px; font-family: inherit; color: #fff; }
        .input-text::placeholder { color: #666; }
        
        /* Input morphs */
        .input-dropzone { border: 2px dashed #333; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; color: #888; }
        .input-dropzone:hover { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.05); color: #fff; }
        .input-audio { width: 100%; height: 60px; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; gap: 8px; color: #888; border: 1px solid #2a2a2a; }
        .input-audio.recording { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #ef4444; animation: pulse 1.5s infinite; }
        
        .icon-btn { width: 32px; height: 32px; border: none; background: transparent; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #666; font-size: 18px; }
        .icon-btn:hover { background: #2a2a2a; color: #fff; }
        .send-btn { width: 32px; height: 32px; border: none; background: #8b5cf6; color: #fff; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn:disabled { background: #333; cursor: not-allowed; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* RIGHT SOCKET: Status/Chain */
        .socket-right { width: 320px; background: #0a0a0a; border-left: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; }
        .panel-header { padding: 20px; border-bottom: 1px solid #1a1a1a; font-size: 14px; font-weight: 600; color: #fff; }
        
        /* Chain visualization */
        .chain-flow { padding: 20px; }
        .chain-title { font-size: 12px; color: #666; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
        .chain-step { display: flex; align-items: center; gap: 12px; padding: 10px 0; font-size: 14px; color: #888; position: relative; }
        .chain-step::after { content: "↓"; position: absolute; left: 11px; top: 38px; color: #333; font-size: 10px; }
        .chain-step:last-child::after { display: none; }
        .chain-step.active { color: #8b5cf6; font-weight: 500; }
        .chain-step.complete { color: #4ade80; }
        .step-dot { width: 24px; height: 24px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid #333; }
        .step-dot.active { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }
        .step-dot.complete { border-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .step-icon { font-size: 12px; }
        
        /* Block inventory */
        .block-grid { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .block-card { padding: 12px; background: #1a1a1a; border-radius: 8px; cursor: pointer; border: 2px solid transparent; text-align: center; }
        .block-card:hover { background: #252525; border-color: #8b5cf6; }
        .block-card.active { background: rgba(139, 92, 246, 0.1); border-color: #8b5cf6; }
        .block-icon { font-size: 24px; margin-bottom: 4px; }
        .block-name { font-size: 12px; font-weight: 500; color: #fff; }
        .block-layer { font-size: 10px; color: #666; margin-top: 2px; }
        
        /* Chain indicator popup */
        .chain-indicator { position: fixed; top: 20px; right: 360px; background: rgba(139, 92, 246, 0.1); border: 1px solid #8b5cf6; color: #8b5cf6; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 1000; backdrop-filter: blur(10px); }
        .chain-indicator .pulse { animation: pulse 1.5s infinite; margin-right: 8px; }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .socket-right { display: none; }
            .socket-left { width: 240px; }
            .chain-indicator { right: 20px; }
        }
    </style>
</head>
<body>
    <!-- LEFT SOCKET: Projects -->
    <div class="socket-left">
        <div class="logo">Cerebrum</div>
        <button class="new-chat-btn" onclick="resetChat()">+ New Chat</button>
        
        <div class="section-title">Recent Projects</div>
        <div class="project-list" id="projectList">
            <div class="project-item active" onclick="loadProject('default')">
                <span>💬</span> General Chat
            </div>
        </div>
    </div>

    <!-- CENTER: Display + Input (Auto-morphing) -->
    <div class="socket-center">
        <!-- DISPLAY SOCKET: Renders whatever backend returns -->
        <div class="display-socket" id="displaySocket">
            <div class="welcome-screen">
                <h1>What can I help you with?</h1>
                <p>Select a block from the sidebar or upload a file to begin</p>
                
                <div class="suggestions">
                    <div class="suggestion" onclick="activateByIntent('Analyze this construction blueprint', 'construction')">
                        🏗️ Analyze construction blueprint
                    </div>
                    <div class="suggestion" onclick="activateByIntent('Transcribe this audio recording', 'voice')">
                        🎤 Transcribe audio to text
                    </div>
                    <div class="suggestion" onclick="activateByIntent('Search my previous documents', 'zvec')">
                        🔍 Search knowledge base
                    </div>
                    <div class="suggestion" onclick="activateByIntent('Write Python function to calculate costs', 'code')">
                        💻 Generate code with AI
                    </div>
                </div>
            </div>
        </div>
        
        <!-- INPUT SOCKET: Auto-morphs based on active block -->
        <div class="input-socket" id="inputSocket">
            <div class="input-box">
                <button class="icon-btn" onclick="showBlockSelector()" title="Select Block">⚡</button>
                <textarea class="input-text" id="textInput" rows="1" placeholder="Ask anything..." onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
                <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Upload">📎</button>
                <button class="send-btn" onclick="sendMessage()" id="sendBtn">➤</button>
            </div>
            <input type="file" id="fileInput" style="display: none" onchange="handleFile(this)">
        </div>
    </div>

    <!-- RIGHT SOCKET: Chain Status + Block Inventory -->
    <div class="socket-right" id="statusSocket">
        <div class="panel-header">Active Chain</div>
        <div class="chain-flow" id="chainFlow">
            <div class="chain-title">No active chain</div>
        </div>
        
        <div class="panel-header">Available Blocks</div>
        <div class="block-grid" id="blockInventory">
            <div style="padding: 40px; text-align: center; color: #666; font-size: 14px;">
                Loading blocks...
            </div>
        </div>
    </div>

    <!-- Chain indicator (shows during execution) -->
    <div id="chainIndicator" style="display: none;"></div>

<script>
// CONFIG - Point to your backend
const API_BASE = 'https://ssdppg-api-j1zs.onrender.com';
let API_KEY = localStorage.getItem('cerebrum_key') || '';

// STATE
let blocks = []; // From /v1/blocks
let activeBlock = null; // Currently selected block
let currentChain = []; // Running chain
let isProcessing = false;

// 1. INITIALIZATION - Discover all blocks from backend
async function init() {
    try {
        const res = await fetch(`${API_BASE}/v1/blocks`, {
            headers: API_KEY ? {'Authorization': `Bearer ${API_KEY}`} : {}
        });
        const data = await res.json();
        blocks = data.blocks || [];
        renderBlockInventory();
        console.log(`🔌 Discovered ${blocks.length} blocks`);
    } catch (err) {
        console.error('Failed to discover blocks:', err);
        document.getElementById('blockInventory').innerHTML = 
            '<div style="padding: 20px; color: #ef4444;">⚠️ Backend offline</div>';
    }
}

// 2. RENDER BLOCK INVENTORY (Right panel)
function renderBlockInventory() {
    const container = document.getElementById('blockInventory');
    container.innerHTML = blocks.map(block => {
        const schema = block.ui_schema || {};
        return `
            <div class="block-card ${activeBlock?.name === block.name ? 'active' : ''}" 
                 onclick="activateBlock('${block.name}')" 
                 title="${block.description || block.name}">
                <div class="block-icon">${schema.input?.icon || '🔧'}</div>
                <div class="block-name">${block.name}</div>
                <div class="block-layer">Layer ${block.layer || 3}</div>
            </div>
        `;
    }).join('');
}

// 3. ACTIVATE BLOCK - Morphs input socket
function activateBlock(blockName) {
    const block = blocks.find(b => b.name === blockName);
    if (!block) return;
    
    activeBlock = block;
    const schema = block.ui_schema || {};
    
    // Morph input socket
    morphInputSocket(schema);
    
    // Update UI
    renderBlockInventory();
    updateChainDisplay([block.name], 'ready');
    
    // Focus input
    setTimeout(() => {
        const input = document.querySelector('#inputSocket textarea, #inputSocket input:not([type="file"])');
        if (input) input.focus();
    }, 100);
}

// 4. MORPH INPUT SOCKET - The magic happens here
function morphInputSocket(schema) {
    const container = document.getElementById('inputSocket');
    const inputType = schema.input?.type || 'text';
    const accept = schema.input?.accept;
    const placeholder = schema.input?.placeholder || 'Ask anything...';
    
    switch(inputType) {
        case 'file':
        case 'pdf':
            container.innerHTML = `
                <div class="input-dropzone" onclick="document.getElementById('fileInput').click()">
                    <div style="font-size: 32px; margin-bottom: 8px;">📎</div>
                    <div style="font-weight: 500; margin-bottom: 4px;">Drop ${accept?.join(', ') || 'file'} here</div>
                    <div style="font-size: 13px; color: #666;">${placeholder}</div>
                    <input type="file" id="fileInput" style="display: none" 
                           accept="${accept?.join(',') || '*'}" 
                           onchange="handleFile(this)">
                </div>
            `;
            break;
            
        case 'image':
            container.innerHTML = `
                <div class="input-dropzone" onclick="document.getElementById('fileInput').click()">
                    <div style="font-size: 32px; margin-bottom: 8px;">🖼️</div>
                    <div style="font-weight: 500;">Upload image</div>
                    <div style="font-size: 13px; color: #666;">${placeholder}</div>
                    <input type="file" id="fileInput" style="display: none" 
                           accept="${accept?.join(',') || 'image/*'}" 
                           onchange="handleFile(this)">
                </div>
            `;
            break;
            
        case 'audio':
            container.innerHTML = `
                <div class="input-audio" id="audioBtn" onclick="toggleRecording()">
                    <span style="font-size: 20px;">🎤</span>
                    <span style="font-weight: 500;">Click to record</span>
                </div>
            `;
            break;
            
        case 'code':
            container.innerHTML = `
                <div class="input-box">
                    <button class="icon-btn" onclick="showBlockSelector()" title="Active: ${activeBlock?.name || 'Auto'}">⚡</button>
                    <textarea class="input-text" id="textInput" rows="3" 
                              placeholder="${placeholder}" 
                              onkeydown="handleKeydown(event)" 
                              oninput="autoResize(this)"></textarea>
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">➤</button>
                </div>
            `;
            break;
            
        case 'text':
        default:
            const multiline = schema.input?.multiline ? 3 : 1;
            container.innerHTML = `
                <div class="input-box">
                    <button class="icon-btn" onclick="showBlockSelector()" title="Active: ${activeBlock?.name || 'Auto'}">⚡</button>
                    <textarea class="input-text" id="textInput" rows="${multiline}" 
                              placeholder="${placeholder}" 
                              onkeydown="handleKeydown(event)" 
                              oninput="autoResize(this)"></textarea>
                    <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Upload">📎</button>
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">➤</button>
                </div>
                <input type="file" id="fileInput" style="display: none" onchange="handleFile(this)">
            `;
    }
}

// 5. HANDLE INPUTS
function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
}

function activateByIntent(text, blockName) {
    activateBlock(blockName);
    const input = document.getElementById('textInput');
    if (input) {
        input.value = text;
        autoResize(input);
    }
}

// 6. SEND MESSAGE - Execute through backend
async function sendMessage() {
    const input = document.getElementById('textInput');
    const text = input?.value?.trim();
    
    if (!text || isProcessing) return;
    
    // Show user message
    addMessage(text, 'user');
    input.value = '';
    autoResize(input);
    
    // Determine chain
    let chain = activeBlock ? [activeBlock.name, 'ai_core'] : ['ai_core'];
    
    // Smart routing if no block selected
    if (!activeBlock) {
        if (text.match(/pdf|blueprint|floorplan|concrete|steel|construction|measurement/i)) {
            chain = ['pdf', 'construction', 'ai_core'];
        } else if (text.match(/code|function|script|python|javascript/i)) {
            chain = ['code', 'ai_core'];
        } else if (text.match(/search|find|look up|where is|previous/i)) {
            chain = ['zvec', 'chat'];
        } else {
            chain = ['chat'];
        }
    }
    
    await executeChain(chain, text);
}

// 7. FILE HANDLING
async function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    
    addMessage(`📎 ${file.name}`, 'user');
    
    try {
        const formData = new FormData();
        formData.append('file', file);
        
        const uploadRes = await fetch(`${API_BASE}/v1/upload`, {
            method: 'POST',
            headers: API_KEY ? {'Authorization': `Bearer ${API_KEY}`} : {},
            body: formData
        });
        
        const uploadData = await uploadRes.json();
        
        // Determine chain
        let chain;
        if (activeBlock) {
            chain = [activeBlock.name, 'ai_core'];
        } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
            chain = ['pdf', 'construction', 'ai_core'];
        } else if (file.type.startsWith('image/')) {
            chain = ['ocr', 'chat'];
        } else {
            chain = ['storage', 'chat'];
        }
        
        await executeChain(chain, { 
            url: uploadData.url, 
            filename: file.name,
            text: `Analyze this ${file.name}`
        });
        
    } catch (err) {
        addMessage(`❌ Upload failed: ${err.message}`, 'error');
    }
}

// 8. EXECUTE CHAIN - Call backend blocks
async function executeChain(chain, input) {
    isProcessing = true;
    currentChain = chain;
    updateChainDisplay(chain, 'running');
    document.getElementById('sendBtn').disabled = true;
    
    try {
        const res = await fetch(`${API_BASE}/v1/chain`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': API_KEY ? `Bearer ${API_KEY}` : ''
            },
            body: JSON.stringify({
                chain: chain,
                input: input,
                params: {}
            })
        });
        
        const data = await res.json();
        
        // Get output schema from last block
        const lastBlockName = chain[chain.length - 1];
        const lastBlock = blocks.find(b => b.name === lastBlockName);
        const outputSchema = lastBlock?.ui_schema?.output || {};
        
        renderOutput(data.final_output || data, outputSchema);
        updateChainDisplay(chain, 'complete');
        
    } catch (err) {
        addMessage(`❌ Error: ${err.message}`, 'error');
        updateChainDisplay(chain, 'error');
    } finally {
        isProcessing = false;
        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) sendBtn.disabled = false;
    }
}

// 9. RENDER OUTPUT - Display socket morphing
function renderOutput(data, schema) {
    const container = document.getElementById('displaySocket');
    const outputType = schema.type || 'text';
    const fields = schema.fields || [];
    
    switch(outputType) {
        case 'table':
            renderTableView(container, data, fields);
            break;
            
        case 'json':
            addMessage(JSON.stringify(data, null, 2), 'assistant');
            break;
            
        case 'list':
            const items = data.results || data.files || [];
            const listText = items.map(i => typeof i === 'string' ? i : i.title || i.text).join('\n');
            addMessage(listText, 'assistant');
            break;
            
        case 'code':
            const code = data.output || data.code || '';
            container.innerHTML += `
                <div class="message assistant">
                    <div class="code-block">${escapeHtml(code)}</div>
                </div>
            `;
            break;
            
        case 'text':
        default:
            const text = data.completion || data.text || data.translated || data.description || JSON.stringify(data, null, 2);
            addMessage(text, 'assistant');
    }
    
    scrollToBottom();
}

function renderTableView(container, data, fields) {
    const quantities = data.quantities || data.result?.quantities || data;
    
    let html = '<div class="message assistant"><div style="margin-bottom: 12px; font-weight: 500;">Analysis Results:</div>';
    
    // Metric cards
    if (fields.length > 0) {
        html += '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px;">';
        fields.forEach(field => {
            const value = quantities[field.name];
            if (value === undefined) return;
            
            const isCost = field.name.includes('cost');
            html += `
                <div style="background: #1a1a1a; padding: 16px; border-radius: 8px; border: 1px solid #2a2a2a;">
                    <div class="metric-value ${isCost ? 'cost' : ''}">${typeof value === 'number' ? value.toLocaleString() : value}${field.unit || ''}</div>
                    <div class="metric-label">${field.label || field.name}</div>
                </div>
            `;
        });
        html += '</div>';
    }
    
    html += '</div>';
    container.innerHTML += html;
}

// 10. CHAIN VISUALIZATION (Right panel)
function updateChainDisplay(chain, status) {
    const container = document.getElementById('chainFlow');
    const indicator = document.getElementById('chainIndicator');
    
    // Update popup indicator
    if (status === 'running' && chain.length > 0) {
        indicator.innerHTML = `<span class="pulse">⚡</span> Running: ${chain.join(' → ')}`;
        indicator.style.display = 'block';
    } else {
        indicator.style.display = 'none';
    }
    
    if (chain.length === 0) {
        container.innerHTML = '<div class="chain-title">No active chain</div>';
        return;
    }
    
    let html = `<div class="chain-title">${status === 'running' ? 'Processing...' : status === 'complete' ? 'Complete' : 'Ready'}</div>`;
    
    chain.forEach((blockName, index) => {
        const block = blocks.find(b => b.name === blockName);
        const schema = block?.ui_schema || {};
        const isActive = status === 'running' && index === chain.length - 1;
        const isComplete = status === 'complete' || (status === 'running' && index < chain.length - 1);
        
        html += `
            <div class="chain-step ${isActive ? 'active' : ''} ${isComplete ? 'complete' : ''}">
                <div class="step-dot ${isActive ? 'active' : ''} ${isComplete ? 'complete' : ''}">
                    <span class="step-icon">${isComplete ? '✓' : isActive ? '◐' : '○'}</span>
                </div>
                <div>
                    <div style="font-weight: 500;">${blockName}</div>
                    <div style="font-size: 12px; color: #666;">${schema.description || ''}</div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

// 11. HELPERS
function addMessage(text, sender) {
    const container = document.getElementById('displaySocket');
    
    // Remove welcome screen if exists
    const welcome = container.querySelector('.welcome-screen');
    if (welcome) welcome.remove();
    
    const div = document.createElement('div');
    div.className = `message ${sender}`;
    div.textContent = text;
    container.appendChild(div);
    scrollToBottom();
}

function scrollToBottom() {
    const container = document.getElementById('displaySocket');
    container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function resetChat() {
    document.getElementById('displaySocket').innerHTML = `
        <div class="welcome-screen">
            <h1>What can I help you with?</h1>
            <p>Select a block from the sidebar or upload a file to begin</p>
        </div>
    `;
    activeBlock = null;
    currentChain = [];
    updateChainDisplay([], 'ready');
    renderBlockInventory();
    
    // Reset to default input
    document.getElementById('inputSocket').innerHTML = `
        <div class="input-box">
            <button class="icon-btn" onclick="showBlockSelector()">⚡</button>
            <textarea class="input-text" id="textInput" rows="1" placeholder="Ask anything..." onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <button class="send-btn" onclick="sendMessage()" id="sendBtn">➤</button>
        </div>
        <input type="file" id="fileInput" style="display: none" onchange="handleFile(this)">
    `;
}

// Voice recording (stub)
let isRecording = false;
function toggleRecording() {
    const btn = document.getElementById('audioBtn');
    if (!isRecording) {
        btn.classList.add('recording');
        btn.innerHTML = '<span style="font-size: 20px;">⏹</span><span style="font-weight: 500;">Recording...</span>';
        isRecording = true;
        // TODO: Implement actual recording
        setTimeout(() => {
            if (isRecording) toggleRecording();
        }, 5000);
    } else {
        btn.classList.remove('recording');
        btn.innerHTML = '<span style="font-size: 20px;">🎤</span><span style="font-weight: 500;">Click to record</span>';
        isRecording = false;
    }
}

function showBlockSelector() {
    document.getElementById('statusSocket').scrollIntoView({ behavior: 'smooth' });
}

// Initialize
init();

// Periodic refresh
setInterval(init, 60000);
</script>
</body>
