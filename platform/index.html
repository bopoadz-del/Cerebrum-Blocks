<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebrum Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; height: 100vh; background: #0d0d0d; overflow: hidden; color: #e0e0e0; }
        .sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 20px; font-weight: 600; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .logo::before { content: "◆"; color: #8b5cf6; font-size: 24px; }
        .new-btn { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; cursor: pointer; margin-bottom: 24px; }
        .new-btn:hover { background: #252525; }
        .section { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .projects { flex: 1; }
        .project { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; color: #999; }
        .project:hover, .project.active { background: #1a1a1a; color: #fff; }
        .main { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; }
        header { padding: 16px; border-bottom: 1px solid #1a1a1a; text-align: center; color: #666; }
        .messages { flex: 1; overflow-y: auto; padding: 40px 20px; }
        .msg { margin-bottom: 24px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { text-align: right; }
        .bubble { display: inline-block; padding: 12px 16px; border-radius: 12px; font-size: 15px; max-width: 80%; white-space: pre-wrap; word-wrap: break-word; }
        .msg.user .bubble { background: #8b5cf6; color: #fff; }
        .msg.assistant .bubble { background: #1a1a1a; color: #d0d0d0; border: 1px solid #2a2a2a; }
        .msg.error .bubble { background: #3a1a1a; color: #ff6666; border: 1px solid #5a2a2a; }
        .msg.system .bubble { background: #1a2a1a; color: #66ff66; border: 1px solid #2a5a2a; font-size: 13px; }
        .input-area { padding: 20px; border-top: 1px solid #1a1a1a; }
        .input-box { display: flex; gap: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px; }
        input, textarea { flex: 1; background: transparent; border: none; color: #fff; font-size: 15px; outline: none; resize: none; min-height: 24px; }
        button { padding: 8px 16px; background: #8b5cf6; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #7c4ddb; }
        button:disabled { background: #333; cursor: not-allowed; }
        .outcomes { width: 320px; background: #0a0a0a; border-left: 1px solid #222; padding: 20px; overflow-y: auto; }
        .outcomes h3 { margin-bottom: 16px; color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .outcome-item { padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 12px; border: 1px solid #2a2a2a; }
        .outcome-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .outcome-value { font-size: 18px; color: #8b5cf6; font-weight: 600; }
        .chain-indicator { position: fixed; top: 20px; right: 360px; background: rgba(139, 92, 246, 0.1); border: 1px solid #8b5cf6; color: #8b5cf6; padding: 10px 16px; border-radius: 10px; font-size: 13px; display: none; }
        .chain-indicator.active { display: block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .file-preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 8px; }
        .raw-output { background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; margin-top: 12px; font-family: monospace; font-size: 12px; color: #888; overflow-x: auto; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Cerebrum</div>
        <button class="new-btn" onclick="resetChat()">+ New Chat</button>
        <div class="section">Projects</div>
        <div class="projects">
            <div class="project active">Diriyah Phase 1</div>
            <div class="project">Qiddam Tower</div>
            <div class="project">KAUST Lab</div>
        </div>
    </div>
    
    <div class="main">
        <header>Cerebrum Platform</header>
        <div class="messages" id="messages">
            <div class="msg assistant">
                <div class="bubble">Hello! Upload a file or type a message to get started.</div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-box">
                <input type="file" id="fileInput" style="display: none" onchange="handleFile(this)" accept=".pdf,.docx,.txt,.jpg,.png">
                <button onclick="document.getElementById('fileInput').click()" title="Upload file">📎</button>
                <textarea id="textInput" rows="1" placeholder="Ask anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                <button onclick="sendMessage()" id="sendBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="outcomes">
        <h3>Results</h3>
        <div id="outcomes"></div>
    </div>
    
    <div class="chain-indicator" id="chainIndicator">⚡ Processing...</div>

<script>
// API Configuration - Auto-detect environment
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
    ? 'http://localhost:8000' 
    : 'https://cerebrum-platform-api.onrender.com';

console.log('API_BASE:', API_BASE);

function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
}

function showIndicator(show) {
    const indicator = document.getElementById('chainIndicator');
    indicator.classList.toggle('active', show);
}

function setOutcomes(html) {
    document.getElementById('outcomes').innerHTML = html;
}

async function sendMessage() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text) return;
    
    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    showIndicator(true);
    
    try {
        const res = await fetch(`${API_BASE}/v1/chain`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                steps: [{block: 'chat', params: {mock: true}}], 
                initial_input: text 
            })
        });
        
        if (!res.ok) {
            throw new Error(`HTTP ${res.status}: ${await res.text()}`);
        }
        
        const data = await res.json();
        
        if (data.success) {
            const output = data.final_output;
            const text = typeof output === 'object' ? (output.text || JSON.stringify(output)) : String(output);
            addMessage(text, 'assistant');
        } else {
            addMessage(`Error: ${data.results?.[0]?.error || 'Unknown error'}`, 'error');
        }
    } catch (err) {
        console.error('Chat error:', err);
        addMessage(`Error: ${err.message}. Make sure the API server is running.`, 'error');
    }
    
    document.getElementById('sendBtn').disabled = false;
    showIndicator(false);
}

async function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    
    addMessage(`📎 ${file.name}`, 'user');
    document.getElementById('sendBtn').disabled = true;
    showIndicator(true);
    setOutcomes('<p style="color: #666;">Uploading...</p>');
    
    try {
        // Step 1: Upload file
        const form = new FormData();
        form.append('file', file);
        
        const uploadRes = await fetch(`${API_BASE}/v1/upload`, { 
            method: 'POST', 
            body: form 
        });
        
        if (!uploadRes.ok) {
            throw new Error(`Upload failed: HTTP ${uploadRes.status}`);
        }
        
        const uploadData = await uploadRes.json();
        console.log('Upload response:', uploadData);
        
        setOutcomes(`
            <div class="outcome-item">
                <div class="outcome-label">File Uploaded</div>
                <div class="outcome-value" style="font-size: 14px;">${uploadData.filename}</div>
            </div>
            <p style="color: #666; font-size: 12px;">Analyzing content...</p>
        `);
        
        // Step 2: Analyze file content using chat block with file info
        const fileContent = await readFileContent(file);
        
        const analysisRes = await fetch(`${API_BASE}/v1/chain`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                steps: [{block: 'chat', params: {mock: true}}], 
                initial_input: `Analyze this file content and extract key information:\n\nFile: ${file.name}\nSize: ${(file.size / 1024).toFixed(1)} KB\n\nContent:\n${fileContent.substring(0, 3000)}` 
            })
        });
        
        if (!analysisRes.ok) {
            throw new Error(`Analysis failed: HTTP ${analysisRes.status}`);
        }
        
        const analysisData = await analysisRes.json();
        console.log('Analysis response:', analysisData);
        
        // Display results
        const output = analysisData.final_output;
        const analysisText = typeof output === 'object' ? (output.text || JSON.stringify(output, null, 2)) : String(output);
        
        // Try to extract quantities for display
        let quantitiesHtml = '';
        if (fileContent.toLowerCase().includes('concrete') || fileContent.toLowerCase().includes('steel')) {
            quantitiesHtml = `
                <div class="outcome-item">
                    <div class="outcome-label">Detected Construction Data</div>
                    <div style="color: #888; font-size: 12px; margin-top: 8px;">
                        ${extractQuantities(fileContent)}
                    </div>
                </div>
            `;
        }
        
        setOutcomes(`
            <div class="outcome-item">
                <div class="outcome-label">File</div>
                <div class="outcome-value" style="font-size: 14px;">${uploadData.filename}</div>
                <div style="color: #666; font-size: 11px; margin-top: 4px;">${(uploadData.size / 1024).toFixed(1)} KB</div>
            </div>
            ${quantitiesHtml}
            <div class="outcome-item">
                <div class="outcome-label">Analysis</div>
                <div style="color: #ccc; font-size: 13px; margin-top: 8px; line-height: 1.5;">
                    ${analysisText.substring(0, 500)}${analysisText.length > 500 ? '...' : ''}
                </div>
            </div>
        `);
        
        addMessage('Analysis complete. See results panel →', 'assistant');
        
    } catch (err) {
        console.error('File handling error:', err);
        addMessage(`Error: ${err.message}`, 'error');
        setOutcomes(`<p style="color: #ff6666;">Error: ${err.message}</p>`);
    }
    
    document.getElementById('sendBtn').disabled = false;
    showIndicator(false);
    input.value = '';
}

function readFileContent(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = (e) => reject(new Error('Failed to read file'));
        
        if (file.name.endsWith('.txt') || file.name.endsWith('.md') || file.name.endsWith('.json')) {
            reader.readAsText(file);
        } else if (file.name.endsWith('.docx')) {
            // For docx, we'll just read as binary and note it
            reader.readAsText(file);
        } else {
            reader.readAsText(file);
        }
    });
}

function extractQuantities(text) {
    // Simple regex to find quantities in text
    const quantities = [];
    
    const patterns = [
        { regex: /(\d+[\d,]*)\s*(?:cubic meters?|m³|cbm)/gi, label: 'Concrete', unit: 'm³' },
        { regex: /(\d+[\d,]*)\s*(?:metric tons?|tons?|kg)/gi, label: 'Steel', unit: 'kg' },
        { regex: /(\d+[\d,]*)\s*(?:square meters?|m²|sqm)/gi, label: 'Area', unit: 'm²' },
    ];
    
    patterns.forEach(({ regex, label, unit }) => {
        const matches = text.match(regex);
        if (matches) {
            quantities.push(`${label}: ${matches[0]}`);
        }
    });
    
    return quantities.length > 0 ? quantities.join('<br>') : 'No standard quantities detected';
}

function resetChat() {
    document.getElementById('messages').innerHTML = `
        <div class="msg assistant">
            <div class="bubble">Hello! Upload a file or type a message to get started.</div>
        </div>
    `;
    setOutcomes('');
    document.getElementById('textInput').value = '';
}

// Auto-resize textarea
document.getElementById('textInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

// Check API health on load
fetch(`${API_BASE}/health`)
    .then(r => r.json())
    .then(data => {
        console.log('API Health:', data);
        addMessage(`✅ Connected to API (${data.blocks_available} blocks available)`, 'system');
    })
    .catch(err => {
        console.error('Health check failed:', err);
        addMessage(`⚠️ API not available at ${API_BASE}`, 'error');
    });
</script>
</body>
</html>
