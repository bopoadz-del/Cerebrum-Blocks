<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebrum Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 40px; border-bottom: 1px solid #2a2a3e; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 600; }
        .logo::before { content: "🧠"; margin-right: 8px; }
        .cart { background: #6c63ff; padding: 10px 20px; border-radius: 8px; color: white; }
        .hero { text-align: center; padding: 60px 40px; background: linear-gradient(135deg, #6c63ff22, #ff6b3522); }
        h1 { font-size: 36px; margin-bottom: 16px; }
        .blocks { max-width: 1400px; margin: 40px auto; padding: 0 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .block-card { background: #1a1a1a; border: 1px solid #2a2a3e; border-radius: 12px; padding: 20px; }
        .block-icon { font-size: 32px; margin-bottom: 12px; }
        .block-name { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .block-desc { color: #888; font-size: 14px; margin-bottom: 12px; }
        .block-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
        .price { font-size: 24px; font-weight: 600; color: #8b5cf6; }
        .buy-btn { background: #6c63ff; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">Cerebrum Store</div>
            <div class="cart">Cart (0) - $0/mo</div>
        </div>
    </header>
    
    <div class="hero">
        <h1>Domain-Specific AI Blocks</h1>
        <p>Build AI Like Lego • Pick your vertical and start building</p>
    </div>
    
    <div class="blocks" id="blocks">Loading...</div>

<script>
const API_BASE = 'https://cerebrum-store-api.onrender.com';

async function loadBlocks() {
    try {
        const res = await fetch(`${API_BASE}/v1/blocks`);
        const data = await res.json();
        
        document.getElementById('blocks').innerHTML = data.blocks.map(b => `
            <div class="block-card">
                <div class="block-icon">${b.icon}</div>
                <div class="block-name">${b.displayName}</div>
                <div class="block-desc">${b.description}</div>
                <div class="block-meta">
                    <div class="price">$${b.price}/mo</div>
                    <button class="buy-btn">Add to Cart</button>
                </div>
            </div>
        `).join('');
    } catch (err) {
        document.getElementById('blocks').innerHTML = '<p>Error loading blocks</p>';
    }
}

loadBlocks();
</script>
</body>
</html>
