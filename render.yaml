services:
  # PLATFORM BACKEND - Block execution
  - type: web
    name: cerebrum-platform-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /app/data
      - key: ENV
        value: production
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /health

  # PLATFORM FRONTEND
  - type: web
    name: cerebrum-platform
    env: static
    buildCommand: echo "Static HTML"
    staticPublishPath: ./platform
    envVars:
      - key: API_URL
        value: https://cerebrum-platform-api.onrender.com

  # STORE BACKEND - Block catalog
  - type: web
    name: cerebrum-store-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn store.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: production
    healthCheckPath: /health

  # STORE FRONTEND
  - type: web
    name: cerebrum-store
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./store/dist
    envVars:
      - key: VITE_API_URL
        value: https://cerebrum-store-api.onrender.com
