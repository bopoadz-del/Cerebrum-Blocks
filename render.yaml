services:
  # API Backend (existing)
  - type: web
    name: cerebrum-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /app/data
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ENV
        value: production
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /health

  # Block Store Frontend
  - type: web
    name: store
    env: static
    buildCommand: cd frontend-store && npm install && npm run build
    staticPublishPath: ./frontend-store/dist
    envVars:
      - key: VITE_API_URL
        value: https://ssdppg.onrender.com

  # Platform Frontend  
  - type: web
    name: platform
    env: static
    buildCommand: cd frontend-platform && npm install && npm run build
    staticPublishPath: ./frontend-platform/dist
    envVars:
      - key: VITE_API_URL
        value: https://ssdppg.onrender.com

# No database needed for now