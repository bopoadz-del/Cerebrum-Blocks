services:
  # PLATFORM BACKEND - Block execution
  - type: web
    name: cerebrum-platform-api
    env: python
    plan: starter
    runtime: python-3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /app/data
      - key: ENV
        value: production
      - key: DEEPSEEK_API_KEY
        value: sk-62229915230e448b82ea08550d11fa86
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /health

  # PLATFORM FRONTEND
  - type: web
    name: cerebrum-platform
    env: static
    buildCommand: echo "Static HTML - no build"
    staticPublishPath: ./platform
    envVars:
      - key: API_URL
        value: https://cerebrum-platform-api.onrender.com

  # STORE BACKEND - Block catalog
  - type: web
    name: cerebrum-store-api
    env: python
    plan: starter
    runtime: python-3.11.0
    rootDir: store
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
    healthCheckPath: /health

  # STORE FRONTEND
  - type: web
    name: cerebrum-store
    env: static
    rootDir: store
    buildCommand: mkdir -p dist && cp src/index.html dist/
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://cerebrum-store-api.onrender.com
