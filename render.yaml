services:
  # API Backend
  - type: web
    name: cerebrum-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /app/data
      - key: DATABASE_URL
        fromDatabase:
          name: cerebrum-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cerebrum-redis
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENV
        value: production
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /health

  # Block Store Frontend (Public Marketplace)
  - type: web
    name: cerebrum-store
    env: static
    buildCommand: cd frontend-store && npm install && npm run build
    staticPublishPath: ./frontend-store/dist
    envVars:
      - key: VITE_API_URL
        value: https://ssdppg.onrender.com

  # Platform Frontend (Developer Console)
  - type: web
    name: cerebrum-platform
    env: static
    buildCommand: cd frontend-platform && npm install && npm run build
    staticPublishPath: ./frontend-platform/dist
    envVars:
      - key: VITE_API_URL
        value: https://ssdppg.onrender.com

  # Redis
  - type: redis
    name: cerebrum-redis
    plan: free
    ipAllowList: []

  # Worker
  - type: worker
    name: cerebrum-worker
    env: docker
    dockerfilePath: ./deploy/cloud/Dockerfile.worker
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cerebrum-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cerebrum-redis
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /app

databases:
  - name: cerebrum-db
    plan: free
    databaseName: cerebrum
    user: cerebrum